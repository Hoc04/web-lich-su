<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng sách</title>
    <!-- Thêm Bootstrap (tùy chọn) để tạo card dễ dàng -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">📚 Cửa hàng sách</h1>
        <div class="row">
            {% for book in books %}
                <div class="col-md-4 mb-4">
                    <div class="card h-100">
                        {% if book.image %}
                            <img src="{{ book.image.url }}" class="card-img-top" alt="{{ book.title }}">
                        {% else %}
                            <img src="{% static 'images/default_book_cover.jpg' %}" class="card-img-top" alt="Ảnh bìa mặc định">
                        {% endif %}
                        <div class="card-body">
                            <h5 class="card-title">{{ book.title }}</h5>
                            <p class="card-text">{{ book.description|truncatechars:100 }}</p>
                            <p class="card-text"><strong>{{ book.price }}đ</strong></p>
                            <a href="#" class="btn btn-primary">Mua ngay</a>
                        </div>
                    </div>
                </div>
            {% empty %}
                <p>Chưa có sách nào.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
