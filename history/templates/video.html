<!DOCTYPE html>
<html>
<head>
    <title>Video Lịch Sử</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        h1 {
            text-align: center;
            background: #e53935;
            color: white;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        <iframe
    width="100%"
    height="250"
    src="{{ v.url }}"
    frameborder="0"
    allowfullscreen>
</iframe>

        .title {
            padding: 10px;
            font-weight: bold;
            text-align: center;
        }

        a {
            display: block;
            text-align: center;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🎥 Video Lịch Sử Việt Nam</h1>

<a href="/">⬅ Về trang chủ</a>

<div class="container">

    <div class="grid">

        {% for v in videos %}
        <div class="card">
            <iframe src="{{ v.url }}" frameborder="0" allowfullscreen></iframe>
            <div class="title">{{ v.title }}</div>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
